name: Release

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false
          token: ''

      - name: Upgrade npm for OIDC trusted publishing support
        run: npm install -g npm@latest

      - name: Remove auth token to allow OIDC
        run: npm config delete //registry.npmjs.org/:_authToken

      - name: Debug environment
        run: |
          echo "=== npm version ==="
          npm --version
          echo "=== node version ==="
          node --version
          echo "=== npm config ==="
          cat $NPM_CONFIG_USERCONFIG || echo "(empty or missing)"
          echo "=== NODE_AUTH_TOKEN set ==="
          [ -n "$NODE_AUTH_TOKEN" ] && echo "yes (non-empty)" || echo "no (empty or unset)"
          echo "=== OIDC available ==="
          [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ] && echo "yes" || echo "no"

      - uses: gittools/actions/gitversion/setup@v3.0.0
        with:
          versionSpec: '5.x'

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3.0.0

      - name: Check if version already published
        id: check
        run: |
          VERSION=${{ steps.gitversion.outputs.majorMinorPatch }}
          if npm view @davitmunjishvili/eslint-config@$VERSION > /dev/null 2>&1; then
            echo "Version $VERSION already published, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Publishing version $VERSION"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Set package version
        if: steps.check.outputs.skip == 'false'
        run: npm version ${{ steps.gitversion.outputs.majorMinorPatch }} --no-git-tag-version

      - name: Publish to npm
        if: steps.check.outputs.skip == 'false'
        run: npm publish --access public
